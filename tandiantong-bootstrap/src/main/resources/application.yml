server:
  port: ${TDT_SERVER_PORT:8080}

spring:
  application:
    name: tandiantong
  datasource:
    url: ${TDT_MYSQL_URL:jdbc:mysql://localhost:3306/tandiantong?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${TDT_MYSQL_USERNAME:tandiantong}
    password: ${TDT_MYSQL_PASSWORD:tandiantong_local_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${TDT_REDIS_HOST:localhost}
      port: ${TDT_REDIS_PORT:6379}
      password: ${TDT_REDIS_PASSWORD:}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level traceId=%X{traceId:-} %logger{36} - %msg%n"
