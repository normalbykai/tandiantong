server:
  port: ${TDT_SERVER_PORT:8080}

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  application:
    name: tandiantong
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${TDT_MYSQL_URL:jdbc:mysql://localhost:3306/tandiantong?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${TDT_MYSQL_USERNAME:tandiantong}
    password: ${TDT_MYSQL_PASSWORD:tandiantong_local_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${TDT_REDIS_HOST:localhost}
      port: ${TDT_REDIS_PORT:6379}
      password: ${TDT_REDIS_PASSWORD:}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: ${TDT_FLYWAY_BASELINE_ON_MIGRATE:false}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-enums-package: com.tandiantong.**.enums
  global-config:
    banner: false
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

sa-token:
  token-name: Authorization
  timeout: ${TDT_SA_TOKEN_TIMEOUT:7200}
  active-timeout: ${TDT_SA_TOKEN_ACTIVE_TIMEOUT:1800}
  is-concurrent: true
  is-share: false
  token-prefix: Bearer
  is-log: false

knife4j:
  enable: ${TDT_KNIFE4J_ENABLE:true}
