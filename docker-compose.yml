services:
  mysql:
    image: mysql:8.4
    container_name: tandiantong-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${TDT_MYSQL_ROOT_PASSWORD:-local_root_password}
      MYSQL_DATABASE: ${TDT_MYSQL_DATABASE:-tandiantong}
      MYSQL_USER: ${TDT_MYSQL_USERNAME:-tandiantong}
      MYSQL_PASSWORD: ${TDT_MYSQL_PASSWORD:-tandiantong_local_password}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${TDT_MYSQL_USERNAME:-tandiantong} -p${TDT_MYSQL_PASSWORD:-tandiantong_local_password}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4
    container_name: tandiantong-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
  redis-data:
